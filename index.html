<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #F8FAFC;
      --main-font: 'Jua', sans-serif;
      --sky-blue: #0ea5e9;
      --danger: #ef4444;
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 0;
      width: 100vw; 
      height: 100vh; height: 100dvh; /* 모바일 동적 높이 완벽 대응 */
      overflow: hidden;
      font-family: var(--main-font);
      background: var(--bg-color);
      user-select: none;
      touch-action: none;
    }

    .bg-pattern {
      position: absolute; width: 100%; height: 100%;
      background-image: radial-gradient(#bae6fd 1.5px, transparent 1.5px);
      background-size: 25px 25px; opacity: 0.4; z-index: 0;
    }

    /* --- 중앙 상단 타이머 (그라데이션 완벽 고정형) --- */
    #global-timer-unit {
      position: absolute; top: env(safe-area-inset-top, 10px); 
      left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 600px; z-index: 300;
      display: none; flex-direction: column; align-items: center;
    }
    .timer-num {
      font-size: clamp(35px, 6vmin, 45px); color: #fbbf24; margin-bottom: 2px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      line-height: 1.1;
    }
    .timer-container {
      width: 100%; height: 18px; background: #334155;
      border-radius: 12px; padding: 2px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
      position: relative;
    }
    .timer-bar {
      width: 100%; height: 100%; border-radius: 10px;
      /* 핵심: 고정된 배경 그라데이션 */
      background: linear-gradient(to right, #ef4444 0%, #facc15 30%, #4ade80 70%, #0ea5e9 100%);
      /* 핵심: 너비를 줄이는 게 아니라 오른쪽부터 잘라냄 (크롭 효과) */
      clip-path: inset(0 0% 0 0); 
      transition: clip-path 1s linear;
    }

    .emergency-text { color: var(--danger) !important; animation: blink 0.5s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* --- CSS GRID 레이아웃 (어떤 화면이든 잘림 방지) --- */
    #main-container { 
      display: grid; width: 100vw; height: 100%; 
      position: relative; z-index: 10; 
      padding-top: 85px; /* 통합 타이머 공간 확보 */
      gap: 0;
    }

    /* 인원수별 Grid 설정 (가로 모드 기본) */
    .grid-p1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .grid-p2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    .grid-p3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .grid-p4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    /* 세로 모드(스마트폰/태블릿 세로) Grid 반응형 적용 */
    @media (orientation: portrait) {
      .grid-p2 { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    }

    .player-zone {
      position: relative;
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-between;
      border-right: 2px dashed rgba(0,0,0,0.1); 
      border-bottom: 2px dashed rgba(0,0,0,0.1);
      overflow: hidden; padding: 15px 5px;
    }
    
    .zone-0 { background: rgba(254, 243, 199, 0.2); --theme: #fbbf24; }
    .zone-1 { background: rgba(252, 231, 243, 0.2); --theme: #f472b6; }
    .zone-2 { background: rgba(236, 254, 255, 0.2); --theme: #22d3ee; }
    .zone-3 { background: rgba(240, 253, 244, 0.2); --theme: #4ade80; }

    .question-box {
      background: white; padding: 6px 20px;
      border-radius: 15px; font-size: clamp(24px, 5vmin, 45px);
      color: #1e293b; box-shadow: 0 6px 12px rgba(0,0,0,0.1);
      border: 4px solid var(--theme); z-index: 50;
      animation: floatAnim 3s ease-in-out infinite;
      flex-shrink: 0; line-height: 1.2;
    }
    @keyframes floatAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    .bottom-hud {
      width: 95%; display: flex; justify-content: space-between; gap: 5px;
      flex-shrink: 0;
    }
    .status-pill {
      background: white; padding: 6px 10px; border-radius: 50px;
      font-size: clamp(12px, 3vmin, 16px); color: #334155; border: 2px solid var(--theme);
      box-shadow: 0 3px 5px rgba(0,0,0,0.05); flex: 1; text-align: center;
    }

    .bubble {
      position: absolute; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(20px, 5vmin, 36px); font-weight: bold; color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2); cursor: pointer;
      box-shadow: inset -5px -5px 10px rgba(255,255,255,0.4), 0 5px 12px rgba(0,0,0,0.15);
      border: 3px solid rgba(255,255,255,0.8); z-index: 40;
    }

    .fx-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }
    .effect-score {
      position: absolute; font-size: clamp(30px, 6vmin, 45px); font-weight: bold;
      animation: scorePop 0.8s ease-out forwards; pointer-events: none;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }
    @keyframes scorePop {
      0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
      20% { transform: translate(-50%, -20px) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -80px) scale(1); opacity: 0; }
    }
    .effect-particle { position: absolute; border-radius: 50%; pointer-events: none; }

    /* 메인 설정 화면 */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: white; display: flex; flex-direction: column;
      align-items: center; z-index: 1000; padding: env(safe-area-inset-top, 20px) 20px 20px; 
      overflow-y: auto;
    }
    .game-logo-box {
      width: clamp(60px, 10vmin, 80px); height: clamp(60px, 10vmin, 80px); 
      background: #fbbf24; border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: clamp(35px, 6vmin, 45px); margin-top: 10px; box-shadow: 0 6px 0 #ca8a04;
    }
    .option-card {
      width: 100%; max-width: 450px; background: #f1f5f9;
      border-radius: 18px; padding: 12px; margin-top: 12px;
    }
    .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 6px; }
    .choice-btn {
      padding: 10px 2px; font-size: clamp(13px, 3vmin, 16px); font-family: var(--main-font);
      background: white; border: 2px solid #cbd5e1; border-radius: 12px;
      cursor: pointer; color: #334155; transition: 0.2s;
    }
    .choice-btn.active { border-color: var(--sky-blue); background: var(--sky-blue); color: white; box-shadow: 0 3px 0 #0369a1; }
    .final-start-btn {
      width: 90%; max-width: 350px; padding: 18px; font-size: clamp(22px, 5vmin, 28px);
      background: #fbbf24; color: white; border: none; border-radius: 50px;
      box-shadow: 0 6px 0 #ca8a04; cursor: pointer; margin: 25px 0 40px;
    }

    .result-card { background: white; padding: 15px; border-radius: 20px; border: 4px solid var(--theme); text-align: center; width: 130px; }
  </style>
</head>
<body>

<div class="bg-pattern"></div>

<div id="setup-overlay" class="overlay">
  <div class="game-logo-box">🫧</div>
  <h1 style="font-size: clamp(26px, 6vmin, 32px); color: #1e293b; margin: 10px 0 0;">팡팡! 구구단 대모험</h1>
  
  <div class="option-card">
    <div style="text-align:center; color:#64748b; margin-bottom:8px; font-size: 15px;">👥 인원 선택</div>
    <div class="btn-grid">
      <button class="choice-btn active" onclick="setOpt('pCount', 1, this)">1인용</button>
      <button class="choice-btn" onclick="setOpt('pCount', 2, this)">2인용</button>
      <button class="choice-btn" onclick="setOpt('pCount', 3, this)">3인용</button>
      <button class="choice-btn" onclick="setOpt('pCount', 4, this)">4인용</button>
    </div>
  </div>

  <div class="option-card">
    <div style="text-align:center; color:#64748b; margin-bottom:8px; font-size: 15px;">⚡ 난이도</div>
    <div class="btn-grid">
      <button class="choice-btn active" onclick="setOpt('speed', 1, this)">천천히</button>
      <button class="choice-btn" onclick="setOpt('speed', 1.8, this)">보통</button>
      <button class="choice-btn" onclick="setOpt('speed', 2.6, this)">번개</button>
    </div>
  </div>

  <div class="option-card">
    <div style="text-align:center; color:#64748b; margin-bottom:8px; font-size: 15px;">🎈 비눗방울 개수</div>
    <div class="btn-grid">
      <button class="choice-btn active" onclick="setOpt('bCount', 4, this)">4개</button>
      <button class="choice-btn" onclick="setOpt('bCount', 5, this)">5개</button>
      <button class="choice-btn" onclick="setOpt('bCount', 6, this)">6개</button>
    </div>
  </div>

  <div class="option-card">
    <div style="text-align:center; color:#64748b; margin-bottom:8px; font-size: 15px;">⏰ 제한 시간</div>
    <div class="btn-grid">
      <button class="choice-btn active" onclick="setOpt('time', 30, this)">30초</button>
      <button class="choice-btn" onclick="setOpt('time', 60, this)">1분</button>
      <button class="choice-btn" onclick="setOpt('time', 120, this)">2분</button>
    </div>
  </div>
  
  <div class="option-card">
    <div style="text-align:center; color:#64748b; margin-bottom:8px; font-size: 15px;">🔊 소리</div>
    <div class="btn-grid">
      <button class="choice-btn active" onclick="setOpt('sound', true, this)">켜기 (ON)</button>
      <button class="choice-btn" onclick="setOpt('sound', false, this)">끄기 (OFF)</button>
    </div>
  </div>

  <button class="final-start-btn" onclick="startGame()">탐험 시작!</button>
</div>

<div id="global-timer-unit">
  <div class="timer-num" id="global-time-num">30</div>
  <div class="timer-container">
    <div class="timer-bar" id="global-time-bar"></div>
  </div>
</div>

<div id="main-container"></div>

<div id="result-overlay" class="overlay" style="display:none; justify-content:center;">
  <h1 style="font-size: clamp(32px, 8vmin, 42px); margin-bottom: 20px;">🏆 탐험 결과</h1>
  <div id="rankings" style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;"></div>
  <button class="final-start-btn" onclick="resetToSetup()">다시 하기</button>
</div>

<script>
  let opts = { pCount: 1, speed: 1, time: 30, bCount: 4, sound: true };
  let audioCtx = null;
  let audioUnlocked = false;
  let players = [];
  let isGameActive = false;
  let animId;
  let globalTimeLeft = 30;

  // --- 모바일 사운드 확실한 잠금 해제 ---
  function unlockAudio() {
    if (audioUnlocked) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // 무음 버퍼 재생으로 브라우저 권한 획득
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    gain.gain.value = 0; // 소리 안 나게
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    audioUnlocked = true;
  }

  // 화면 터치 시 무조건 오디오 권한 획득 시도
  document.body.addEventListener('touchstart', unlockAudio, { once: true });
  document.body.addEventListener('click', unlockAudio, { once: true });

  function playTone(freq, dur, type = 'sine') {
    if (!opts.sound || !audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + dur);
    } catch(e) { console.log(e); }
  }

  function setOpt(key, val, el) {
    unlockAudio();
    opts[key] = val;
    el.parentElement.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  const animals = [
    { emoji: '🐻', name: '곰돌이', color: '#fbbf24' },
    { emoji: '🐰', name: '토끼', color: '#f472b6' },
    { emoji: '🐱', name: '고양이', color: '#22d3ee' },
    { emoji: '🐶', name: '강아지', color: '#4ade80' }
  ];

  function startGame() {
    unlockAudio();
    document.getElementById('setup-overlay').style.display = 'none';
    document.getElementById('global-timer-unit').style.display = 'flex';
    const container = document.getElementById('main-container');
    container.innerHTML = '';
    
    // 인원수에 맞춘 CSS Grid 클래스 할당
    container.className = `grid-p${opts.pCount}`;
    
    players = [];
    globalTimeLeft = opts.time;

    for (let i = 0; i < opts.pCount; i++) {
      const p = { id: i, score: 0, currentAnswer: 0, animal: animals[i], bubbles: [] };
      players.push(p);
      const zone = document.createElement('div');
      zone.className = `player-zone zone-${i}`;
      zone.innerHTML = `
        <div class="fx-layer" id="fx-${i}"></div>
        <div class="question-box" id="q-${i}">? × ?</div>
        <div id="bubble-area-${i}" style="flex:1; width:100%; position:relative;"></div>
        <div class="bottom-hud">
          <div class="status-pill">${p.animal.emoji} ${p.animal.name}</div>
          <div class="status-pill">⭐ <span id="score-${i}">0</span></div>
        </div>
      `;
      container.appendChild(zone);
    }
    isGameActive = true;
    players.forEach(p => nextQuestion(p));
    startGlobalTimer();
    animate();
  }

  function startGlobalTimer() {
    const numEl = document.getElementById('global-time-num');
    const barEl = document.getElementById('global-time-bar');
    numEl.classList.remove('emergency-text');
    
    const timer = setInterval(() => {
      if (!isGameActive) { clearInterval(timer); return; }
      globalTimeLeft--;
      numEl.innerText = globalTimeLeft;
      
      // clip-path를 이용해 그라데이션 고정 + 오른쪽에서부터 잘라냄
      const cutPercent = 100 - ((globalTimeLeft / opts.time) * 100);
      barEl.style.clipPath = `inset(0 ${cutPercent}% 0 0)`;
      
      if (globalTimeLeft <= 5) {
        numEl.classList.add('emergency-text');
        if(opts.sound) playTone(150, 0.1, 'sine');
      }
      if (globalTimeLeft <= 0) {
        clearInterval(timer);
        isGameActive = false;
        cancelAnimationFrame(animId);
        if(opts.sound) [440, 554, 659].forEach(f => playTone(f, 0.8, 'triangle'));
        showResults();
      }
    }, 1000);
  }

  function nextQuestion(p) {
    const a = Math.floor(Math.random() * 8) + 2;
    const b = Math.floor(Math.random() * 9) + 1;
    p.currentAnswer = a * b;
    document.getElementById(`q-${p.id}`).innerText = `${a} × ${b}`;
    createBubbles(p);
  }

  function createBubbles(p) {
    const area = document.getElementById(`bubble-area-${p.id}`);
    if(!area) return;
    area.innerHTML = '';
    p.bubbles = [];
    const choices = [p.currentAnswer];
    while(choices.length < opts.bCount) {
      const w = (Math.floor(Math.random()*8)+2)*(Math.floor(Math.random()*9)+1);
      if(!choices.includes(w)) choices.push(w);
    }
    choices.sort(() => Math.random() - 0.5);
    choices.forEach(val => {
      const bEl = document.createElement('div');
      bEl.className = 'bubble';
      bEl.innerText = val;
      // 반응형 크기 계산 (vmin 기준)
      const size = 60 + Math.random()*25;
      const x = Math.random()*(area.offsetWidth - size);
      const y = area.offsetHeight + 20;
      bEl.style.cssText = `width:clamp(60px, 12vmin, 90px); height:clamp(60px, 12vmin, 90px); left:${x}px; top:${y}px; background:${p.animal.color}e6;`;
      bEl.onpointerdown = (e) => { e.preventDefault(); handlePick(p, val, bEl); };
      area.appendChild(bEl);
      p.bubbles.push({ el: bEl, x, y, speed: (1.2 + Math.random()) * opts.speed, wobble: Math.random()*Math.PI });
    });
  }

  function handlePick(p, val, el) {
    const fxLayer = document.getElementById(`fx-${p.id}`);
    const rect = el.getBoundingClientRect();
    const zoneRect = fxLayer.getBoundingClientRect();
    const cX = rect.left - zoneRect.left + rect.width / 2;
    const cY = rect.top - zoneRect.top + rect.height / 2;

    if (val === p.currentAnswer) {
      p.score += 10;
      playTone(880, 0.15, 'sine');
      showFX(fxLayer, cX, cY, p.animal.color, "+10", "#22c55e");
      el.remove();
      nextQuestion(p);
    } else {
      p.score = Math.max(0, p.score - 5);
      playTone(220, 0.3, 'square');
      showFX(fxLayer, cX, cY, "#ef4444", "-5", "#ef4444", false);
    }
    const scoreEl = document.getElementById(`score-${p.id}`);
    if(scoreEl) scoreEl.innerText = p.score;
  }

  function showFX(layer, x, y, color, text, textColor, isCorrect = true) {
    const s = document.createElement('div');
    s.className = 'effect-score';
    s.innerText = text;
    s.style.cssText = `left:${x}px; top:${y}px; color:${textColor};`;
    layer.appendChild(s);
    setTimeout(() => s.remove(), 800);
    if (isCorrect) {
      for(let i=0; i<8; i++) {
        const p = document.createElement('div');
        p.className = 'effect-particle';
        p.style.cssText = `width:12px; height:12px; background:${color}; left:${x}px; top:${y}px; position:absolute; border-radius:50%;`;
        layer.appendChild(p);
        const angle = (Math.PI*2/8)*i;
        const vel = 4 + Math.random()*6;
        let cx = x, cy = y, op = 1;
        const move = () => {
          cx += Math.cos(angle)*vel; cy += Math.sin(angle)*vel; op -= 0.05;
          p.style.left = cx + 'px'; p.style.top = cy + 'px'; p.style.opacity = op;
          if(op > 0) requestAnimationFrame(move); else p.remove();
        };
        move();
      }
    }
  }

  function animate() {
    if (!isGameActive) return;
    players.forEach(p => {
      const area = document.getElementById(`bubble-area-${p.id}`);
      if(!area) return;
      p.bubbles.forEach(b => {
        b.y -= b.speed;
        b.wobble += 0.04;
        b.el.style.top = b.y + 'px';
        b.el.style.left = (b.x + Math.sin(b.wobble)*15) + 'px';
        if (b.y < -150) { b.y = area.offsetHeight + 20; b.x = Math.random()*(area.offsetWidth-80); }
      });
    });
    animId = requestAnimationFrame(animate);
  }

  function showResults() {
    document.getElementById('global-timer-unit').style.display = 'none';
    const res = document.getElementById('result-overlay');
    const rankArea = document.getElementById('rankings');
    rankArea.innerHTML = '';
    
    [...players].sort((a,b) => b.score - a.score).forEach((p, idx) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.style.setProperty('--theme', p.animal.color);
      card.innerHTML = `<div style="font-size:clamp(40px, 8vmin, 60px);">${idx === 0 ? '👑' : p.animal.emoji}</div>
                        <h3 style="font-size:18px; margin:5px 0;">${p.animal.name}</h3>
                        <div style="font-size:clamp(20px, 5vmin, 28px); font-weight:bold;">${p.score}점</div>`;
      rankArea.appendChild(card);
    });
    res.style.display = 'flex';
  }

  function resetToSetup() {
    document.getElementById('result-overlay').style.display = 'none';
    document.getElementById('setup-overlay').style.display = 'flex';
    document.getElementById('main-container').innerHTML = '';
  }
</script>
</body>
</html>
